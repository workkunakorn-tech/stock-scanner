<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสแกนสต็อกสินค้า V9 (Fix Sound & Time)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }
        body {
            background-color: #f6f8fa;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 24px;
            position: relative;
        }
        .header {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 8px;
        }
        /* ส่วนเลือกช่องทาง / Channel */
        .channel-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-channel {
            background: #f1f5f9;
            border: 2px solid transparent;
            padding: 12px 5px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .btn-channel.active {
            background: #eff6ff;
            border-color: #2563eb;
            color: #2563eb;
        }
        /* ปุ่มเปิดกล้อง */
        .btn-scan-toggle {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            background: #2563eb;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            margin-bottom: 20px;
        }
        /* พื้นที่กล้องสแกน */
        #reader {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: none !important;
            margin-bottom: 15px;
        }
        /* กล่องแจ้งเตือนสถานะ */
        .alert-box {
            display: none;
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        /* ตารางประวัติ */
        .history-section {
            margin-top: 10px;
        }
        .history-title {
            font-size: 15px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .history-table th {
            color: #94a3b8;
            font-weight: 400;
            padding: 8px 4px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
        }
        .history-table td {
            padding: 12px 4px;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        .status-loading {
            text-align: center;
            color: #94a3b8;
            padding: 20px 0;
            font-size: 13px;
        }

        /* เอฟเฟกต์หน้าจอกะพริบสีเขียวเมื่อสแกนสำเร็จ */
        #flashOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(34, 197, 94, 0.7);
            z-index: 99999;
            pointer-events: none;
            opacity: 0;
            display: none;
            transition: opacity 0.03s ease-out;
        }

        /* หน้าต่างป็อปอัปกรอกจำนวนสินค้า (Modal Overlay) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 9998;
            padding: 20px;
        }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 380px;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            animation: popUp 0.15s ease-out;
        }
        @keyframes popUp {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-barcode {
            background: #f1f5f9;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin: 10px 0 20px 0;
            word-break: break-all;
        }
        .qty-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        .btn-qty {
            background: #f1f5f9;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            font-size: 26px;
            font-weight: 600;
            color: #1e293b;
            cursor: pointer;
        }
        .qty-display {
            font-size: 28px;
            font-weight: 600;
            width: 80px;
            text-align: center;
            border: none;
            outline: none;
            color: #1e293b;
        }
        .btn-submit {
            background: #22c55e;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
        }
    </style>
</head>
<body>

<div id="flashOverlay"></div>

<div class="modal-overlay" id="qtyModal">
    <div class="modal-content">
        <div style="font-size: 18px; font-weight: 600; color: #1e293b;">🎯 สแกนสำเร็จ!</div>
        <div style="font-size: 13px; color: #64748b; margin-top: 4px;">รหัสบาร์โค้ดสินค้า:</div>
        <div class="modal-barcode" id="modalBarcodeTxt">---------</div>
        
        <div class="section-title">ระบุจำนวนสินค้าที่ต้องการบันทึก</div>
        <div class="qty-container">
            <button class="btn-qty" onclick="changeQty(-1)">-</button>
            <input type="number" class="qty-display" id="qtyInput" value="1" min="1" readonly>
            <button class="btn-qty" onclick="changeQty(1)">+</button>
        </div>
        
        <button class="btn-submit" onclick="submitData()">💾 บันทึกข้อมูล</button>
    </div>
</div>

<div class="container">
    <div class="header">📦 ระบบนับ STOCK สินค้า</div>
    
    <div class="section-title">เลือก ช่องทาง / CHANNEL</div>
    <div class="channel-container">
        <div class="btn-channel active" onclick="selectChannel('FG')">FG</div>
        <div class="btn-channel" onclick="selectChannel('80C NO PK')">80C NO PK</div>
        <div class="btn-channel" onclick="selectChannel('80Q NO')">80Q NO</div>
    </div>
    
    <button class="btn-scan-toggle" id="scanBtn" onclick="toggleScanner()">📷 เปิดกล้องสแกนเนอร์</button>
    
    <div id="reader"></div>
    
    <div class="alert-box" id="alertBox"></div>
    
    <div class="history-section">
        <div class="history-title">📋 5 รายการล่าสุด (รหัสบาร์โค้ด)</div>
        <table class="history-table" id="historyTable" style="display: none;">
            <thead>
                <tr>
                    <th style="width: 28%;">เวลา</th>
                    <th style="width: 22%;">คลัง</th>
                    <th style="width: 38%;">รหัสบาร์โค้ด</th>
                    <th style="width: 12%; text-align: center;">จำนวน</th>
                </tr>
            </thead>
            <tbody id="historyBody">
            </tbody>
        </table>
        <div class="status-loading" id="tableStatus">กำลังโหลดประวัติ...</div>
    </div>
</div>

<script>
    // ========================================================
    // ⚠️ สำคัญมาก: ลบข้อความข้างล่างนี้แล้ววาง URL Web App ของคุณแทนที่ ⚠️
    // ========================================================
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwlxxuInw7EyJKaMAdcpjZ5-CAEfEEs0wF6UWfPUpBspJBxpmUIkTGIDr89BASFLxTlnQ/exec"; 

    let currentChannel = 'FG';
    let html5QrcodeScanner = null;
    let isScanning = false;
    let isModalOpen = false; 
    let lastScannedBarcode = ""; 

    window.onload = function() {
        loadHistory();
    };

    // 🔊 ฟังก์ชันสร้างเสียง "ติ๊ด" อิเล็กทรอนิกส์ (Web Audio API)
    function playBeepSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine'; // คลื่นเสียงใส
            oscillator.frequency.setValueAtTime(987.77, audioCtx.currentTime); // คีย์เสียงสูงใส (โน้ต B5)
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime); // ระดับความดัง
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.12); // ให้เสียงดังเป็นเวลา 0.12 วินาทีแล้วดับ
        } catch (e) {
            console.error("เบราว์เซอร์ไม่รองรับระบบเสียงอัตโนมัติ:", e);
        }
    }

    function triggerGreenFlash() {
        const flash = document.getElementById('flashOverlay');
        flash.style.display = 'block';
        flash.style.opacity = '1';
        
        setTimeout(() => {
            flash.style.opacity = '0';
            setTimeout(() => { flash.style.display = 'none'; }, 30);
        }, 120);
    }

    function selectChannel(channelName) {
        currentChannel = channelName;
        document.querySelectorAll('.btn-channel').forEach(btn => {
            if(btn.innerText === channelName) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    function resetModal() {
        document.getElementById('qtyInput').value = 1;
    }

    function changeQty(amount) {
        const qtyInput = document.getElementById('qtyInput');
        let currentVal = parseInt(qtyInput.value) || 1;
        currentVal += amount;
        if(currentVal < 1) currentVal = 1;
        qtyInput.value = currentVal;
    }

    function showAlert(msg, isError = true) {
        const box = document.getElementById('alertBox');
        if(msg) {
            box.innerHTML = msg;
            box.style.background = isError ? "#fef2f2" : "#f0fdf4";
            box.style.borderColor = isError ? "#fee2e2" : "#bbf7d0";
            box.style.color = isError ? "#dc2626" : "#16a34a";
            box.style.display = 'block';
        } else {
            box.style.display = 'none';
        }
    }

    function toggleScanner() {
        const scanBtn = document.getElementById('scanBtn');
        if (!isScanning) {
            showAlert(null);
            scanBtn.innerText = "🛑 ปิดกล้องสแกนเนอร์";
            scanBtn.style.background = "#dc2626";
            
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                {
                    fps: 30, 
                    qrbox: function(width, height) {
                        return { width: width * 0.85, height: height * 0.45 }; 
                    },
                    experimentalFeatures: {
                        useBarCodeDetectorIfSupported: true
                    }
                },
                onScanSuccess,
                onScanError
            ).then(() => {
                isScanning = true;
            }).catch(err => {
                scanBtn.innerText = "📷 เปิดกล้องสแกนเนอร์";
                scanBtn.style.background = "#2563eb";
                isScanning = false;
                showAlert(`❌ กล้องไม่ทำงาน: เปิดลิงก์นี้บน Chrome หรือ Safari โดยตรง`);
            });
        } else {
            stopScanner();
        }
    }

    function stopScanner() {
        const scanBtn = document.getElementById('scanBtn');
        if (html5QrcodeScanner && isScanning) {
            html5QrcodeScanner.stop().then(() => {
                document.getElementById('reader').innerHTML = '';
                scanBtn.innerText = "📷 เปิดกล้องสแกนเนอร์";
                scanBtn.style.background = "#2563eb";
                isScanning = false;
            }).catch(err => console.error(err));
        }
    }

    function onScanSuccess(decodedText, decodedResult) {
        if (isModalOpen) return; 
        
        isModalOpen = true; 
        playBeepSound(); // 🔊 ส่งเสียงติ๊ดทันทีที่ยิงโดนบาร์โค้ด
        triggerGreenFlash(); // 🟢 หน้าจอกะพริบสีเขียว
        
        lastScannedBarcode = decodedText;
        document.getElementById('modalBarcodeTxt').innerText = decodedText;
        resetModal(); 

        document.getElementById('qtyModal').style.display = 'flex';
    }

    function onScanError(err) { }

    function submitData() {
        document.getElementById('qtyModal').style.display = 'none';
        showAlert("⏳ กำลังบันทึกข้อมูลเข้าสู่ระบบ...", false);
        
        const qty = document.getElementById('qtyInput').value;

        fetch(BACKEND_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                barcode: lastScannedBarcode,
                channel: currentChannel,
                qty: qty
            })
        })
        .then(() => {
            showAlert("✅ บันทึกสำเร็จเรียบร้อย!", false);
            setTimeout(() => { showAlert(null); }, 1200); 
            
            isModalOpen = false; 
            loadHistory(); 
        })
        .catch(err => {
            showAlert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อข้อมูล");
            isModalOpen = false;
        });
    }

    function loadHistory() {
        const tableStatus = document.getElementById('tableStatus');
        const historyTable = document.getElementById('historyTable');
        const historyBody = document.getElementById('historyBody');

        fetch(`${BACKEND_URL}?action=getHistory`)
        .then(res => res.json())
        .then(data => {
            if(data && data.length > 0) {
                historyBody.innerHTML = '';
                data.forEach(item => {
                    // 🛡️ ดักจับชื่อตัวแปรทุกรูปแบบ + ดึงค่าแถวแรกสุดมาแทนกรณีแปรหลุดล็อก เพื่อแก้ปัญหาคำว่า undefined
                    let displayTime = item.เวลา || item.time || item.timestamp || item.Timestamp || item.date || item.formattedTime || (Object.values(item)[0] ? Object.values(item)[0] : '-');
                    
                    historyBody.innerHTML += `
                        <tr>
                            <td style="color: #64748b; font-weight: 500; font-size:11px;">${displayTime}</td>
                            <td>${item.channel}</td>
                            <td style="font-weight: 500; color: #1e293b; word-break: break-all;">${item.barcode}</td>
                            <td style="text-align: center; font-weight:600;">${item.qty}</td>
                        </tr>
                    `;
                });
                tableStatus.style.display = 'none';
                historyTable.style.display = 'table';
            } else {
                tableStatus.innerText = 'ยังไม่มีประวัติการบันทึกในวันนี้';
            }
        })
        .catch(err => {
            tableStatus.innerText = 'ไม่สามารถโหลดประวัติได้ (ตรวจสอบ URL เว็บแอป)';
        });
    }
</script>

</body>
</html>
