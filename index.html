<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสแกนสต็อกสินค้า V16 (พร้อมปุ่มยกเลิก)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }
        body {
            background-color: #f6f8fa;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 24px;
            position: relative;
        }
        .header {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 8px;
        }
        /* ส่วนเลือกช่องทาง / Channel */
        .channel-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-channel {
            background: #f1f5f9;
            border: 2px solid transparent;
            padding: 12px 5px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .btn-channel.active {
            background: #eff6ff;
            border-color: #2563eb;
            color: #2563eb;
        }
        /* ปุ่มเปิดกล้อง */
        .btn-scan-toggle {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            background: #2563eb;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            margin-bottom: 20px;
        }
        
        /* พื้นที่กล้องสแกนและตัวช่วยเล็งโฟกัส */
        .scanner-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 15px;
            background: #000;
        }
        #reader {
            width: 100%;
            border: none !important;
        }
        /* เส้นเลเซอร์สีแดงช่วยโฟกัสตรงกลางกล่อง */
        .laser-line {
            display: none;
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 2px;
            background-color: #ef4444;
            box-shadow: 0 0 8px #ef4444;
            z-index: 10;
            pointer-events: none;
            transform: translateY(-50%);
            animation: blinkLaser 1s infinite;
        }
        @keyframes blinkLaser {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* กล่องแจ้งเตือนสถานะ */
        .alert-box {
            display: none;
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        /* ตารางประวัติ */
        .history-section {
            margin-top: 10px;
        }
        .history-title {
            font-size: 15px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .history-table th {
            color: #94a3b8;
            font-weight: 400;
            padding: 8px 4px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
        }
        .history-table td {
            padding: 12px 4px;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        .status-loading {
            text-align: center;
            color: #94a3b8;
            padding: 20px 0;
            font-size: 13px;
        }

        /* เอฟเฟกต์หน้าจอกะพริบเมื่อสแกนสำเร็จ */
        #flashOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(34, 197, 94, 0.7);
            z-index: 99999;
            pointer-events: none;
            opacity: 0;
            display: none;
            transition: opacity 0.03s ease-out;
        }

        /* หน้าต่างป็อปอัปกรอกจำนวนสินค้า */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 9998;
            padding: 20px;
        }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 380px;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            animation: popUp 0.15s ease-out;
        }
        @keyframes popUp {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-barcode {
            background: #f1f5f9;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin: 10px 0 20px 0;
            word-break: break-all;
        }
        .qty-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 24px;
        }
        .btn-qty {
            background: #f1f5f9;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            font-size: 26px;
            font-weight: 600;
            color: #1e293b;
            cursor: pointer;
            user-select: none;
        }
        .qty-display {
            font-size: 26px;
            font-weight: 600;
            width: 110px;
            text-align: center;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            padding: 8px 5px;
            outline: none;
            color: #1e293b;
            background: #ffffff;
            -webkit-appearance: none;
            margin: 0;
        }
        .qty-display:focus {
            border-color: #2563eb;
            background: #f8fafc;
        }
        
        /* ปุ่มบันทึกข้อมูล */
        .btn-submit {
            background: #22c55e;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
            margin-bottom: 10px;
        }
        
        /* ❌ ปุ่มยกเลิกที่เพิ่มเข้ามาใหม่ */
        .btn-cancel {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-cancel:hover {
            background: #e2e8f0;
            color: #475569;
        }
    </style>
</head>
<body>

<div id="flashOverlay"></div>

<div class="modal-overlay" id="qtyModal">
    <div class="modal-content">
        <div style="font-size: 18px; font-weight: 600; color: #1e293b;">🎯 ตรวจสอบรหัสถูกต้อง!</div>
        <div style="font-size: 13px; color: #64748b; margin-top: 4px;">รหัสบาร์โค้ดสินค้า (ตรวจสอบ 3 ชั้นแล้ว):</div>
        <div class="modal-barcode" id="modalBarcodeTxt">---------</div>
        
        <div class="section-title">ระบุจำนวนสินค้า (พิมพ์เลขหรือกดปุ่มได้)</div>
        <div class="qty-container">
            <button class="btn-qty" onclick="changeQty(-1)">-</button>
            <input type="number" class="qty-display" id="qtyInput" value="1" min="1" inputmode="numeric" pattern="[0-9]*" onclick="this.select()" onfocus="this.select()" oninput="validateInput(this)">
            <button class="btn-qty" onclick="changeQty(1)">+</button>
        </div>
        
        <button class="btn-submit" onclick="submitData()">💾 บันทึกข้อมูล</button>
        <button class="btn-cancel" onclick="cancelScan()">❌ ยกเลิกการบันทึก</button>
    </div>
</div>

<div class="container">
    <div class="header">📦 ระบบนับ STOCK สินค้า</div>
    
    <div class="section-title">เลือก ช่องทาง / CHANNEL</div>
    <div class="channel-container">
        <div class="btn-channel active" onclick="selectChannel('FG')">FG</div>
        <div class="btn-channel" onclick="selectChannel('80C NO PK')">80C NO PK</div>
        <div class="btn-channel" onclick="selectChannel('80Q NO')">80Q NO</div>
    </div>
    
    <button class="btn-scan-toggle" id="scanBtn" onclick="toggleScanner()">📷 เปิดกล้องสแกนเนอร์</button>
    
    <div class="scanner-wrapper">
        <div class="laser-line" id="laser"></div>
        <div id="reader"></div>
    </div>
    
    <div class="alert-box" id="alertBox"></div>
    
    <div class="history-section">
        <div class="history-title">📋 5 รายการล่าสุด (รหัสบาร์โค้ด)</div>
        <table class="history-table" id="historyTable" style="display: none;">
            <thead>
                <tr>
                    <th style="width: 32%;">เวลา</th>
                    <th style="width: 22%;">คลัง</th>
                    <th style="width: 34%;">รหัสบาร์โค้ด</th>
                    <th style="width: 12%; text-align: center;">จำนวน</th>
                </tr>
            </thead>
            <tbody id="historyBody">
            </tbody>
        </table>
        <div class="status-loading" id="tableStatus">กำลังโหลดประวัติ...</div>
    </div>
</div>

<script>
    // ========================================================
    // ⚠️ สำคัญมาก: ลบข้อความข้างล่างนี้แล้ววาง URL Web App ของคุณแทนที่ ⚠️
    // ========================================================
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxxA5PTMRnfCczlWsvKqKRLGIpctv4BDW5syP9bhttX_h6MbkxSYJh0KprI_mO2b6fruA/exec"; 

    let currentChannel = 'FG';
    let html5QrcodeScanner = null;
    let isScanning = false;
    let isModalOpen = false; 
    let lastScannedBarcode = ""; 
    let audioCtx = null; 

    // ตัวแปรควบคุมระบบตรวจสอบความถูกต้อง 3 ชั้น
    let consecutiveCount = 0;
    let lastCheckedText = "";

    window.onload = function() {
        loadHistory();
    };

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playBeepSound() {
        try {
            initAudio(); 
            if (!audioCtx) return;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine'; 
            oscillator.frequency.setValueAtTime(1046.50, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.20, audioCtx.currentTime); 
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.10); 
        } catch (e) {
            console.error("ระบบเล่นเสียงขัดข้อง:", e);
        }
    }

    function triggerGreenFlash() {
        const flash = document.getElementById('flashOverlay');
        flash.style.display = 'block';
        flash.style.opacity = '1';
        
        setTimeout(() => {
            flash.style.opacity = '0';
            setTimeout(() => { flash.style.display = 'none'; }, 30);
        }, 120);
    }

    function selectChannel(channelName) {
        currentChannel = channelName;
        document.querySelectorAll('.btn-channel').forEach(btn => {
            if(btn.innerText === channelName) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    function resetModal() {
        document.getElementById('qtyInput').value = 1;
    }

    function changeQty(amount) {
        const qtyInput = document.getElementById('qtyInput');
        let currentVal = parseInt(qtyInput.value) || 1;
        currentVal += amount;
        if(currentVal < 1) currentVal = 1;
        qtyInput.value = currentVal;
    }

    function validateInput(input) {
        if (input.value !== '' && parseInt(input.value) < 1) {
            input.value = 1;
        }
    }

    function showAlert(msg, isError = true) {
        const box = document.getElementById('alertBox');
        if(msg) {
            box.innerHTML = msg;
            box.style.background = isError ? "#fef2f2" : "#f0fdf4";
            box.style.borderColor = isError ? "#fee2e2" : "#bbf7d0";
            box.style.color = isError ? "#dc2626" : "#16a34a";
            box.style.display = 'block';
        } else {
            box.style.display = 'none';
        }
    }

    function toggleScanner() {
        initAudio(); 
        
        const scanBtn = document.getElementById('scanBtn');
        const laser = document.getElementById('laser');

        if (!isScanning) {
            showAlert(null);
            scanBtn.innerText = "🛑 ปิดกล้องสแกนเนอร์";
            scanBtn.style.background = "#dc2626";
            laser.style.display = "block"; 
            
            consecutiveCount = 0;
            lastCheckedText = "";

            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                {
                    fps: 8, 
                    qrbox: function(width, height) {
                        return { 
                            width: Math.floor(width * 0.95), 
                            height: Math.floor(height * 0.35) 
                        }; 
                    },
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.CODE_39,
                        Html5QrcodeSupportedFormats.CODE_128
                    ],
                    experimentalFeatures: {
                        useBarCodeDetectorIfSupported: true
                    }
                },
                onScanSuccess,
                onScanError
            ).then(() => {
                isScanning = true;
            }).catch(err => {
                scanBtn.innerText = "📷 เปิดกล้องสแกนเนอร์";
                scanBtn.style.background = "#2563eb";
                laser.style.display = "none";
                isScanning = false;
                showAlert(`❌ กล้องไม่ทำงาน: เปิดลิงก์นี้บน Chrome หรือ Safari โดยตรง`);
            });
        } else {
            stopScanner();
        }
    }

    function stopScanner() {
        const scanBtn = document.getElementById('scanBtn');
        const laser = document.getElementById('laser');
        if (html5QrcodeScanner && isScanning) {
            html5QrcodeScanner.stop().then(() => {
                document.getElementById('reader').innerHTML = '';
                scanBtn.innerText = "📷 เปิดกล้องสแกนเนอร์";
                scanBtn.style.background = "#2563eb";
                laser.style.display = "none";
                isScanning = false;
            }).catch(err => console.error(err));
        }
    }

    function onScanSuccess(decodedText, decodedResult) {
        if (isModalOpen) return; 

        if (decodedText === lastCheckedText) {
            consecutiveCount++;
        } else {
            lastCheckedText = decodedText;
            consecutiveCount = 1;
            return; 
        }

        if (consecutiveCount < 3) {
            return; 
        }
        
        isModalOpen = true; 
        consecutiveCount = 0;
        lastCheckedText = "";

        playBeepSound(); 
        triggerGreenFlash(); 
        
        lastScannedBarcode = decodedText;
        document.getElementById('modalBarcodeTxt').innerText = decodedText;
        resetModal(); 

        document.getElementById('qtyModal').style.display = 'flex';

        setTimeout(() => {
            const qtyInput = document.getElementById('qtyInput');
            qtyInput.focus();
            qtyInput.select(); 
        }, 100);
    }

    function onScanError(err) { }

    // 🛑 ฟังก์ชันยกเลิกการบันทึกข้อมูล (เพิ่มเข้ามาใหม่)
    function cancelScan() {
        document.getElementById('qtyModal').style.display = 'none'; // ปิดหน้าต่างป็อปอัป
        isModalOpen = false; // ปลดล็อกสถานะเพื่อให้ระบบกล้องพร้อมรับการสแกนรอบใหม่ได้ทันที
        consecutiveCount = 0; // ล้างค่าความถถี่ตัวสแกนเก่า
        lastCheckedText = "";
        
        showAlert("❌ ยกเลิกการบันทึกรายการแล้ว", true);
        setTimeout(() => { showAlert(null); }, 1000); // แสดงข้อความแจ้งเตือนแป๊บนึงแล้วซ่อนซะ
    }

    function submitData() {
        const qtyInput = document.getElementById('qtyInput');
        let qty = parseInt(qtyInput.value) || 1;
        if (qty < 1) qty = 1;

        document.getElementById('qtyModal').style.display = 'none';
        showAlert("⏳ กำลังบันทึกข้อมูลเข้าสู่ระบบ...", false);

        fetch(BACKEND_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                barcode: lastScannedBarcode,
                channel: currentChannel,
                qty: qty
            })
        })
        .then(() => {
            showAlert("✅ บันทึกสำเร็จเรียบร้อย!", false);
            setTimeout(() => { showAlert(null); }, 1200); 
            
            isModalOpen = false; 
            loadHistory(); 
        })
        .catch(err => {
            showAlert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อข้อมูล");
            isModalOpen = false;
        });
    }

    function loadHistory() {
        const tableStatus = document.getElementById('tableStatus');
        const historyTable = document.getElementById('historyTable');
        const historyBody = document.getElementById('historyBody');

        fetch(`${BACKEND_URL}?action=getHistory`)
        .then(res => res.json())
        .then(data => {
            if(data && data.length > 0) {
                historyBody.innerHTML = '';
                data.forEach(item => {
                    let displayTime = "-";
                    const possibleTimeKeys = ['เวลา', 'time', 'timestamp', 'Timestamp', 'date', 'วันที่', 'dateTime'];
                    
                    for (let k of possibleTimeKeys) {
                        if (item[k] !== undefined && item[k] !== null) {
                            displayTime = item[k];
                            break;
                        }
                    }
                    
                    if (displayTime === "-") {
                        for (let key in item) {
                            let lKey = key.toLowerCase();
                            if (!['channel', 'barcode', 'qty', 'quantity', 'รายการสินค้า', 'คลัง', 'จำนวน'].includes(lKey)) {
                                displayTime = item[key];
                                break;
                            }
                        }
                    }
                    
                    historyBody.innerHTML += `
                        <tr>
                            <td style="color: #64748b; font-weight: 500; font-size:11px;">${displayTime}</td>
                            <td>${item.channel || item.คลัง || '-'}</td>
                            <td style="font-weight: 500; color: #1e293b; word-break: break-all;">${item.barcode || '-'}</td>
                            <td style="text-align: center; font-weight:600;">${item.qty || item.จำนวน || '1'}</td>
                        </tr>
                    `;
                });
                tableStatus.style.display = 'none';
                historyTable.style.display = 'table';
            } else {
                tableStatus.innerText = 'ยังไม่มีประวัติการบันทึกในวันนี้';
            }
        })
        .catch(err => {
            tableStatus.innerText = 'ไม่สามารถโหลดประวัติได้ (ตรวจสอบ URL เว็บแอป)';
        });
    }
</script>

</body>
</html>
