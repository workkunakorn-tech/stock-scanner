<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสแกนสต็อกสินค้า V4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }
        body {
            background-color: #f6f8fa;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 24px;
        }
        .header {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 8px;
        }
        /* ส่วนเลือกช่องทาง / Channel */
        .channel-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-channel {
            background: #f1f5f9;
            border: 2px solid transparent;
            padding: 12px 5px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .btn-channel.active {
            background: #eff6ff;
            border-color: #2563eb;
            color: #2563eb;
        }
        /* ส่วนเพิ่มลดจำนวน */
        .qty-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .btn-qty {
            background: #f1f5f9;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            cursor: pointer;
        }
        .qty-display {
            font-size: 22px;
            font-weight: 600;
            width: 60px;
            text-align: center;
            border: none;
            outline: none;
        }
        /* ปุ่มเปิดกล้อง */
        .btn-scan-toggle {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            background: #2563eb;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            margin-bottom: 20px;
        }
        /* พื้นที่กล้องสแกน */
        #reader {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: none !important;
            margin-bottom: 15px;
        }
        /* กล่องแจ้งเตือนสถานะ / Error */
        .alert-box {
            display: none;
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        /* ตารางประวัติ */
        .history-section {
            margin-top: 10px;
        }
        .history-title {
            font-size: 15px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .history-table th {
            color: #94a3b8;
            font-weight: 400;
            padding: 8px 4px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
        }
        .history-table td {
            padding: 10px 4px;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
        }
        .status-loading {
            text-align: center;
            color: #94a3b8;
            padding: 20px 0;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">📦 ระบบนับ STOCK สินค้า</div>
    
    <div class="section-title">เลือก ช่องทาง / CHANNEL</div>
    <div class="channel-container">
        <div class="btn-channel active" onclick="selectChannel('FG')">FG</div>
        <div class="btn-channel" onclick="selectChannel('80C NO PK')">80C NO PK</div>
        <div class="btn-channel" onclick="selectChannel('80Q NO')">80Q NO</div>
    </div>
    
    <div class="section-title" style="text-align: center;">ระบุจำนวนสินค้า</div>
    <div class="qty-container">
        <button class="btn-qty" onclick="changeQty(-1)">-</button>
        <input type="number" class="qty-display" id="qtyInput" value="1" min="1" readonly>
        <button class="btn-qty" onclick="changeQty(1)">+</button>
    </div>
    
    <button class="btn-scan-toggle" id="scanBtn" onclick="toggleScanner()">📷 เปิดกล้องสแกนเนอร์</button>
    
    <div id="reader"></div>
    
    <div class="alert-box" id="alertBox"></div>
    
    <div class="history-section">
        <div class="history-title">📋 5 รายการล่าสุดที่ผ่านการสแกน</div>
        <table class="history-table" id="historyTable" style="display: none;">
            <thead>
                <tr>
                    <th style="width: 20%;">เวลา</th>
                    <th style="width: 25%;">คลัง</th>
                    <th style="width: 40%;">รายการสินค้า</th>
                    <th style="width: 15%; text-align: center;">จำนวน</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                </tbody>
        </table>
        <div class="status-loading" id="tableStatus">กำลังโหลดประวัติ...</div>
    </div>
</div>

<script>
    // ==========================================
    // ⚠️ ใส่ลิงก์ WEB APP ตัวใหม่ของคุณที่บรรทัดด้านล่างนี้ ⚠️
    // ==========================================
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwVPpwwUko6cGe5srsEgxM07Wol9VxWBcXTX4ZrTbvn5SGW2Fo5tbyHJGDIrUgRDGFi4w/exec"; 

    let currentChannel = 'FG';
    let html5QrcodeScanner = null;
    let isScanning = false;
    let isSubmitting = false; // ป้องกันการส่งซ้ำตอนกำลังบันทึก

    // ฟังก์ชันสร้างเสียงติ๊ดสแกนสินค้า (Synth Audio)
    function playScanSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime); // ความถี่ 1200Hz เสียงแหลมคมชัดแบบเครื่องสแกนห้าง
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime); // ระดับความดัง

            oscillator.start();
            // ควบคุมให้เสียงหยุดใน 0.08 วินาที เพื่อให้ได้เสียงติ๊ดสั้นกระชับ
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.08);
            oscillator.stop(audioCtx.currentTime + 0.08);
        } catch (e) {
            console.log("ระบบบราวเซอร์บล็อกการเล่นเสียงอัตโนมัติ:", e);
        }
    }

    // โหลดประวัติเมื่อเปิดหน้าเว็บครั้งแรก
    window.onload = function() {
        loadHistory();
    };

    // เลือกช่องทาง คลังสินค้า
    function selectChannel(channelName) {
        currentChannel = channelName;
        document.querySelectorAll('.btn-channel').forEach(btn => {
            if(btn.innerText === channelName) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // เพิ่มลดจำนวนสินค้า
    function changeQty(amount) {
        const qtyInput = document.getElementById('qtyInput');
        let currentVal = parseInt(qtyInput.value) || 1;
        currentVal += amount;
        if(currentVal < 1) currentVal = 1;
        qtyInput.value = currentVal;
    }

    // แสดงกล่องแจ้งเตือนข้อผิดพลาด
    function showAlert(msg) {
        const box = document.getElementById('alertBox');
        if(msg) {
            box.innerHTML = msg;
            box.style.display = 'block';
        } else {
            box.style.display = 'none';
        }
    }

    // สลับเปิด-ปิดกล้อง
    function toggleScanner() {
        const scanBtn = document.getElementById('scanBtn');
        if (!isScanning) {
            showAlert(null);
            scanBtn.innerText = "🛑 ปิดกล้องสแกนเนอร์";
            scanBtn.style.background = "#dc2626";
            
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                {
                    fps: 10,
                    qrbox: function(width, height) {
                        return { width: width * 0.8, height: height * 0.4 }; // ขนาดกรอบสแกนแนวนอนเหมาะกับบาร์โค้ด
                    }
                },
                onScanSuccess,
                onScanError
            ).then(() => {
                isScanning = true;
            }).catch(err => {
                scanBtn.innerText = "📷 เปิดกล้องสแกนเนอร์";
                scanBtn.style.background = "#2563eb";
                isScanning = false;
                showAlert(`❌ กล้องไม่ทำงาน:<br>Error getting userMedia, error = ${err}<br><br>💡 วิธีแก้: กดเปิดลิงก์นี้ใน Google Chrome หรือ Safari โดยตรง (ไม่กดผ่านแอป LINE)`);
            });
        } else {
            stopScanner();
        }
    }

    // สั่งหยุดกล้อง
    function stopScanner() {
        const scanBtn = document.getElementById('scanBtn');
        if (html5QrcodeScanner && isScanning) {
            html5QrcodeScanner.stop().then(() => {
                document.getElementById('reader').innerHTML = '';
                scanBtn.innerText = "📷 เปิดกล้องสแกนเนอร์";
                scanBtn.style.background = "#2563eb";
                isScanning = false;
            }).catch(err => console.error("Failed to stop scanner", err));
        }
    }

    // เมื่อสแกนติดบาร์โค้ดสำเร็จ
    function onScanSuccess(decodedText, decodedResult) {
        if (isSubmitting) return; // ถ้ากำลังบันทึกรายการก่อนหน้าอยู่ ให้ข้ามไปก่อนเพื่อกันข้อมูลซ้ำ
        
        // 🔊 สั่งเล่นเสียงติ๊ดทันทีที่สแกนเจอ!
        playScanSound();
        
        isSubmitting = true;
        showAlert("⏳ กำลังบันทึกข้อมูลเข้าสู่ระบบ...");
        
        const qty = document.getElementById('qtyInput').value;

        // ส่งข้อมูลไปที่ Google Apps Script หลังบ้าน
        fetch(BACKEND_URL, {
            method: 'POST',
            mode: 'no-cors', // ตั้งค่าแบบไม่มี cors ตามมาตรฐานเว็บแอปทั่วไป
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                barcode: decodedText,
                channel: currentChannel,
                qty: qty
            })
        })
        .then(() => {
            showAlert("✅ บันทึกสำเร็จเรียบร้อย!");
            setTimeout(() => { showAlert(null); }, 2000); // ซ่อนการแจ้งเตือนใน 2 วินาที
            isSubmitting = false;
            loadHistory(); // รีเฟรชตารางประวัติใหม่
        })
        .catch(err => {
            showAlert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อข้อมูล");
            isSubmitting = false;
        });
    }

    function onScanError(err) {
        // ปล่อยว่างไว้เพื่อไม่ให้ล็อกข้อความแจ้งเตือนสีแดงเต็มหน้าจอตอนกล้องกำลังไล่หาบาร์โค้ด
    }

    // ดึงข้อมูลประวัติล่าสุดจาก Google Sheets มาแสดงผล
    function loadHistory() {
        const tableStatus = document.getElementById('tableStatus');
        const historyTable = document.getElementById('historyTable');
        const historyBody = document.getElementById('historyBody');

        fetch(`${BACKEND_URL}?action=getHistory`)
        .then(res => res.json())
        .then(data => {
            if(data && data.length > 0) {
                historyBody.innerHTML = '';
                data.forEach(item => {
                    historyBody.innerHTML += `
                        <tr>
                            <td>${item.time}</td>
                            <td>${item.channel}</td>
                            <td>${item.description || '<span style="color:#94a3b8">ไม่พบชื่อสินค้า</span>'}<br><small style="color:#64748b; font-size:11px;">${item.barcode}</small></td>
                            <td style="text-align: center; font-weight:600;">${item.qty}</td>
                        </tr>
                    `;
                });
                tableStatus.style.display = 'none';
                historyTable.style.display = 'table';
            } else {
                tableStatus.innerText = 'ยังไม่มีประวัติการบันทึกในวันนี้';
            }
        })
        .catch(err => {
            tableStatus.innerText = 'ไม่สามารถโหลดประวัติได้ (ตรวจสอบ URL เว็บแอป)';
        });
    }
</script>

</body>
</html>
